<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>Mídias</title>
</head>
<body>

    <section id="admInformacao">

        <header>
            <h2>Gerenciamento de Informações</h2>
            <p>Aqui você pode gerenciar as informações do Grêmio VIVA</p>
        </header>

        <div class="form-container">
            <h4>Novo Evento</h4>
                    <label for="foto">Banner principal:</label>
                    <input type="file" id="foto" accept="image/*">
                    <button type="submit">Enviar</button>

                    <label for="carrossel">Carrossel de Imagens:</label>
                    <input type="file" id="carrossel" accept="image/*" multiple>
                    <button type="submit">Enviar</button>

                    <label for="destaque">Destaque:</label>
                    <input type="text" id="destaque" placeholder="Digite o texto de destaque">
                    <button type="submit">Salvar Destaque</button>

                    <button type="button" onclick="window.location='/html/controleGremio.html'">Voltar</button>
        </div>

    </section>

</body>
</html>
